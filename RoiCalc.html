<script>
/**
 * RoiCalc.html — Pure JS ROI Calculation Engine (client-side)
 * Formulas from Solar_ROI_Calculator_v3.xlsx (§3 of design doc)
 * No GAS dependencies — runs entirely in browser
 */
var RoiCalc = (function () {

  // ==================== Energy Flow ====================

  function calcEnergyFlow(inputs) {
    var kWp = inputs.kWp || 0;
    var PSH = inputs.PSH || 4.5;
    var PR = inputs.PR || 0.85;
    var monthlyKwh = inputs.monthlyKwh || 0;
    var dayFrac = inputs.dayFraction || 0.4;
    var kWhBatt = inputs.batteryKwh || 0;
    var includeFit = inputs.includeFit || false;
    var deg = inputs.panelDegradation || 0.005;

    var solarDaily = kWp * PSH * PR;
    var totalDaily = monthlyKwh * 12 / 365;
    var dayDaily = totalDaily * dayFrac;
    var nightDaily = totalDaily * (1 - dayFrac);

    var selfD, sellD, buyD, chargeD, battOut;

    if (kWhBatt > 0) {
      // Case 2: with battery (Steady-State Daily Cycle)
      var excessD = Math.max(0, solarDaily - dayDaily);
      var battCapacityEffective = kWhBatt * (inputs.batteryDod || 0.9);
      var maxUsefulCharge = nightDaily / (inputs.batteryRoundTrip || 0.92);
      
      // ชาร์จไฟเท่าที่มี excess, สูงสุดไม่เกินความจุแบตเตอรี่, และสูงสุดไม่เกินปริมาณไฟที่ต้องใช้กลางคืน
      chargeD = Math.min(excessD, battCapacityEffective, maxUsefulCharge);
      
      battOut = chargeD * (inputs.batteryRoundTrip || 0.92);
      
      // ไฟผลิตเกินส่วนที่เหลือจากการชาร์จ จะถูกนำไปขาย
      sellD = Math.max(0, excessD - chargeD);
      
      var buyND = Math.max(0, nightDaily - battOut); // battOut <= nightDaily อยู่แล้ว
      var buyDD = Math.max(0, dayDaily - solarDaily);
      buyD = buyND + buyDD;
      
      selfD = Math.min(solarDaily, dayDaily) + battOut;
    } else {
      // Case 1: no battery
      selfD = Math.min(solarDaily, dayDaily);
      sellD = Math.max(0, solarDaily - dayDaily);
      buyD = nightDaily + Math.max(0, dayDaily - solarDaily);
      chargeD = 0;
      battOut = 0;
    }

    return {
      solarDaily: solarDaily,
      totalDaily: totalDaily,
      dayDaily: dayDaily,
      nightDaily: nightDaily,
      selfD: selfD,
      sellD: sellD,
      buyD: buyD,
      chargeD: chargeD || 0,
      battOut: battOut || 0,
      hasBattery: kWhBatt > 0
    };
  }

  // ==================== Annual Cashflow ====================

  function calcAnnualCashflow(inputs) {
    var flow = calcEnergyFlow(inputs);
    var deg = inputs.panelDegradation || 0.005;
    var life = inputs.systemLifeYr || 25;
    var pElec = inputs.avgElecRate || 4.0;
    var esc = inputs.electricityEscalation || 0.03;
    var pFit = inputs.fitPrice || 2.2;
    var includeFit = inputs.includeFit || false;
    var mMain = inputs.maintenanceYr != null ? inputs.maintenanceYr : 3500;
    var pSolar = inputs.price || 0;
    var disc = inputs.discountRate || 0.05;

    var years = [];
    var cumulative = 0;
    var npv = 0;

    for (var n = 1; n <= life; n++) {
      var degFactor = Math.pow(1 - deg, n - 1);
      var solarYr = flow.solarDaily * degFactor * 365;
      var selfYr = flow.selfD * degFactor * 365;
      var sellYr = (includeFit ? flow.sellD * degFactor * 365 : 0);
      var saving = selfYr * pElec * Math.pow(1 + esc, n - 1) + sellYr * pFit;
      var cf = saving - mMain - (n === 1 ? pSolar : 0);

      cumulative += cf;
      npv += cf / Math.pow(1 + disc, n);

      years.push({
        year: n,
        solarYr: solarYr,
        selfYr: selfYr,
        sellYr: sellYr,
        saving: saving,
        maintenance: mMain,
        investment: n === 1 ? pSolar : 0,
        cashflow: cf,
        cumulative: cumulative,
        npvSoFar: npv
      });
    }

    return { years: years, flow: flow };
  }

  // ==================== KPI ====================

  function calcKpi(cashflowData) {
    var years = cashflowData.years;
    var npv = years[years.length - 1].npvSoFar;

    // Payback — interpolate year where cumulative crosses 0
    var payback = null;
    for (var i = 0; i < years.length; i++) {
      if (years[i].cumulative >= 0) {
        if (i === 0) {
          payback = 1;
        } else {
          var prev = years[i - 1].cumulative;
          var curr = years[i].cumulative;
          var frac = prev !== curr ? -prev / (curr - prev) : 0;
          payback = i + frac;
        }
        break;
      }
    }

    // IRR — Newton's method
    var irr = _calcIRR(years);

    return {
      payback: payback,
      npv: npv,
      irr: irr,
      totalSaving: years.reduce(function (s, y) { return s + y.saving; }, 0),
      totalMaintenance: years.reduce(function (s, y) { return s + y.maintenance; }, 0),
      annualSavingYr1: years.length > 0 ? years[0].saving : 0
    };
  }

  function _calcIRR(years) {
    var cfs = years.map(function (y) { return y.cashflow; });
    var guess = 0.1;
    for (var iter = 0; iter < 100; iter++) {
      var npv = 0, dnpv = 0;
      for (var i = 0; i < cfs.length; i++) {
        var factor = Math.pow(1 + guess, i + 1);
        npv += cfs[i] / factor;
        dnpv -= (i + 1) * cfs[i] / (factor * (1 + guess));
      }
      if (Math.abs(npv) < 0.01) return guess;
      if (Math.abs(dnpv) < 1e-10) break;
      guess = guess - npv / dnpv;
      if (guess < -0.99) guess = -0.5;
      if (guess > 10) guess = 5;
    }
    return guess;
  }

  // ==================== Installment Schedule ====================

  function calcInstallmentSchedule(principal, plan, tiers, termMonths, downPct, benchmarks) {
    // NOTE: principal is already the post-down-payment loan amount.
    // downPct is used only for tier filtering, NOT for reducing principal again.
    var loan = principal;
    if (loan <= 0 || termMonths <= 0) {
      return { schedule: [], totalInterest: 0, avgInstallment: 0, monthlyPayments: [], totalFees: 0 };
    }

    var planTiers = _filterTiers(tiers, plan.plan_id, termMonths, downPct);
    if (plan.rate_type === 'flat') {
      return _calcFlatSchedule(loan, planTiers, termMonths, benchmarks, plan);
    } else {
      return _calcReducingSchedule(loan, planTiers, termMonths, benchmarks, plan);
    }
  }

  // Normalize a down-payment value to integer-percent space (0-100).
  // CSV authors mix two conventions: fractional ("0.20" = 20%) and
  // percent ("20" = 20%). UI always emits percent. Anything <= 1 is
  // treated as a fraction; anything > 1 is treated as already-percent.
  function _normalizeDownPct(v) {
    var n = parseFloat(v);
    if (isNaN(n)) return NaN;
    return n <= 1 ? n * 100 : n;
  }

  function _filterTiers(tiers, planId, termMonths, downPct) {
    var targetPct = _normalizeDownPct(downPct);

    // Step 1: filter by planId and term
    var planTermTiers = tiers.filter(function (t) {
      if (t.plan_id !== planId) return false;
      var terms = t.applies_to_term_months.toString().split(',');
      if (terms.indexOf('*') === -1 && terms.indexOf(String(termMonths)) === -1) return false;
      return true;
    });

    // Step 2: for down%, use "closest match <= target" logic.
    // If tier has '*' for down → always include.
    // If tier has specific down% values → include the one closest to (but <=) user's down%.
    var wildcardTiers = [];
    var specificTiers = [];
    planTermTiers.forEach(function (t) {
      var downs = t.applies_to_down_percent.toString().split(',');
      if (downs.indexOf('*') !== -1) {
        wildcardTiers.push(t);
      } else {
        // Find the closest down option in this tier that's <= target
        var bestDist = Infinity;
        downs.forEach(function (d) {
          var dp = _normalizeDownPct(d);
          if (!isNaN(dp) && dp <= targetPct + 0.5) {
            var dist = targetPct - dp;
            if (dist < bestDist) bestDist = dist;
          }
        });
        if (bestDist < Infinity) {
          specificTiers.push({ tier: t, dist: bestDist });
        }
      }
    });

    // If we have specific-down tiers, pick those with the closest down%
    var result = wildcardTiers.slice();
    if (specificTiers.length > 0) {
      var minDist = Math.min.apply(null, specificTiers.map(function (s) { return s.dist; }));
      specificTiers.forEach(function (s) {
        if (s.dist <= minDist + 0.5) result.push(s.tier);
      });
    }

    return result.sort(function (a, b) { return a.from_month - b.from_month; });
  }

  function _resolveTierRate(tier, benchmarks) {
    if (tier.rate_value && tier.rate_value !== '' && Number(tier.rate_value) !== 0) {
      var rate = Number(tier.rate_value);
      // Auto-normalize: if rate > 1, it's in percent form (e.g. 7.39) → convert to fraction
      if (rate > 1) rate = rate / 100;
      return rate;
    }
    if (tier.reference_offset !== undefined && tier.reference_offset !== null && tier.reference_offset !== '') {
      var offset = Number(tier.reference_offset);
      // resolve benchmark — try to find MRR/MLR from benchmarks
      for (var i = 0; i < benchmarks.length; i++) {
        var bm = benchmarks[i];
        if (bm.benchmark_code) {
          var val = Number(bm.value) || 0;
          if (val > 1) val = val / 100;
          return val + offset;
        }
      }
      return offset; // fallback
    }
    return 0;
  }

  function _calcFlatSchedule(loan, tiers, termMonths, benchmarks, plan) {
    var schedule = [];
    var totalInterest = 0;
    var totalVat = 0;
    var principalPerMonth = loan / termMonths;

    // Determine if VAT applies (personal_loan, home_equity — not credit card)
    var ftype = plan ? (plan.financing_type || '') : '';
    var applyVat = (ftype === 'personal_loan' || ftype === 'home_equity');
    var vatRate = applyVat ? 0.07 : 0;
    var monthlyFee = Number(plan && plan.monthly_fee) || 0;

    if (tiers.length === 0) {
      // no tiers — treat as 0% interest
      for (var m = 1; m <= termMonths; m++) {
        schedule.push({
          month: m,
          principal: principalPerMonth,
          interest: 0,
          vat: 0,
          fee: monthlyFee,
          installment: principalPerMonth + monthlyFee
        });
      }
    } else {
      // fill gaps if tiers don't cover all months
      var sorted = tiers.slice().sort(function (a, b) { return a.from_month - b.from_month; });
      for (var m = 1; m <= termMonths; m++) {
        var tier = _findTierForMonth(m, sorted);
        var r = tier ? _resolveTierRate(tier, benchmarks) : 0;
        var interestPerMonth = loan * r / 12;
        var vatAmount = interestPerMonth * vatRate;
        var installment = principalPerMonth + interestPerMonth + vatAmount + monthlyFee;
        totalInterest += interestPerMonth;
        totalVat += vatAmount;
        schedule.push({
          month: m,
          principal: principalPerMonth,
          interest: interestPerMonth,
          vat: vatAmount,
          fee: monthlyFee,
          installment: installment
        });
      }
    }

    var avgInstallment = schedule.length > 0
      ? schedule.reduce(function (s, r) { return s + r.installment; }, 0) / schedule.length
      : 0;

    return {
      schedule: schedule,
      totalInterest: totalInterest,
      totalVat: totalVat,
      totalFees: monthlyFee * termMonths,
      avgInstallment: avgInstallment
    };
  }

  function _calcReducingSchedule(loan, tiers, termMonths, benchmarks, plan) {
    var schedule = [];
    var balance = loan;
    var totalInterest = 0;
    var totalVat = 0;
    var sorted = tiers.slice().sort(function (a, b) { return a.from_month - b.from_month; });

    // Determine if VAT applies
    var ftype = plan ? (plan.financing_type || '') : '';
    var applyVat = (ftype === 'personal_loan' || ftype === 'home_equity');
    var vatRate = applyVat ? 0.07 : 0;
    var monthlyFee = Number(plan && plan.monthly_fee) || 0;

    for (var m = 1; m <= termMonths; m++) {
      var tier = _findTierForMonth(m, sorted);
      var annualRate = tier ? _resolveTierRate(tier, benchmarks) : 0;
      var monthlyRate = annualRate / 12;
      var interest = balance * monthlyRate;
      var vatAmount = interest * vatRate;

      // remaining months at this rate tier
      var remainingInTier = tier ? (tier.to_month - m + 1) : (termMonths - m + 1);
      remainingInTier = Math.min(remainingInTier, termMonths - m + 1);

      var installment;
      if (monthlyRate === 0) {
        installment = balance / remainingInTier + interest;
      } else {
        installment = _pmt(monthlyRate, remainingInTier, balance);
      }

      var principalPaid = installment - interest;
      if (principalPaid > balance) {
        principalPaid = balance;
        installment = principalPaid + interest;
      }
      balance -= principalPaid;
      if (balance < 0) balance = 0;
      totalInterest += interest;
      totalVat += vatAmount;

      // Add VAT + fee to installment for display
      var fullInstallment = installment + vatAmount + monthlyFee;

      schedule.push({
        month: m,
        principal: principalPaid,
        interest: interest,
        vat: vatAmount,
        fee: monthlyFee,
        installment: fullInstallment,
        balance: balance
      });
    }

    var avgInstallment = schedule.length > 0
      ? schedule.reduce(function (s, r) { return s + r.installment; }, 0) / schedule.length
      : 0;

    return {
      schedule: schedule,
      totalInterest: totalInterest,
      totalVat: totalVat,
      totalFees: monthlyFee * termMonths,
      avgInstallment: avgInstallment
    };
  }

  function _findTierForMonth(month, sortedTiers) {
    for (var i = 0; i < sortedTiers.length; i++) {
      if (month >= sortedTiers[i].from_month && month <= sortedTiers[i].to_month) {
        return sortedTiers[i];
      }
    }
    return sortedTiers.length > 0 ? sortedTiers[sortedTiers.length - 1] : null;
  }

  function _pmt(rate, nper, pv) {
    if (rate === 0) return pv / nper;
    return pv * rate * Math.pow(1 + rate, nper) / (Math.pow(1 + rate, nper) - 1);
  }

  // ==================== System Comparison ====================

  function buildSystemComparison(session, products, assumptions, benchmarks) {
    var assumption = _getDefaultAssumption(assumptions);
    var inputs = _sessionToCalcInputs(session, assumption);

    var results = products.map(function (product) {
      var prodInputs = _mergeProductInputs(inputs, product);
      return _calcProductRow(prodInputs, product);
    });

    // highlight badges
    if (results.length > 0) {
      var bestNpv = results.reduce(function (best, r) { return r.kpi.npv > best.kpi.npv ? r : best; });
      bestNpv._badges = bestNpv._badges || [];
      bestNpv._badges.push('คุ้มสุด');

      var bestPayback = results.reduce(function (best, r) {
        return (r.kpi.payback || 999) < (best.kpi.payback || 999) ? r : best;
      });
      bestPayback._badges = bestPayback._badges || [];
      bestPayback._badges.push('คืนทุนเร็ว');

      results.forEach(function (r) {
        if (r.flow.solarDaily * 365 > 0) {
          var ratio = r.flow.selfD / r.flow.dayDaily;
          if (ratio >= 0.85 && ratio <= 1.15) {
            r._badges = r._badges || [];
            r._badges.push('size พอดี');
          }
        }
      });
    }

    return results;
  }

  function _getDefaultAssumption(assumptions) {
    for (var i = 0; i < assumptions.length; i++) {
      if (assumptions[i].assumption_id === 'DEFAULT' || assumptions[i].region === 'DEFAULT') {
        return assumptions[i];
      }
    }
    return assumptions[0] || {};
  }

  function _sessionToCalcInputs(session, assumption) {
    return {
      monthlyKwh: Number(session.monthly_kwh) || 0,
      dayFraction: Number(session.day_fraction) || 0.4,
      includeFit: session.include_fit === true || session.include_fit === 'TRUE',
      PSH: Number(assumption.peak_sun_hours) || 4.5,
      PR: Number(assumption.performance_ratio) || 0.85,
      panelDegradation: Number(assumption.panel_degradation_yr) || 0.005,
      systemLifeYr: Number(assumption.system_life_yr) || 25,
      batteryDod: Number(assumption.battery_dod) || 0.9,
      batteryRoundTrip: Number(assumption.battery_round_trip) || 0.92,
      batteryLifeYr: Number(assumption.battery_life_yr) || 10,
      electricityEscalation: Number(assumption.electricity_escalation_yr) || 0.03,
      discountRate: Number(assumption.discount_rate) || 0.05,
      fitPrice: Number(assumption.fit_price) || 2.2,
      maintenanceYr: Number(assumption.maintenance_yr) || 3500,
      avgElecRate: Number(session.avg_elec_rate) || 4.0
    };
  }

  function _mergeProductInputs(inputs, product) {
    var merged = {};
    for (var k in inputs) merged[k] = inputs[k];
    // Sheet column header in solar_products is "kWp" (the canonical SI unit)
    // but earlier code paths used .kw. Accept any casing to keep the
    // calculator working regardless of which sheet template the admin
    // imported — without this fallback solarDaily comes out as 0 and the
    // entire savings calculation collapses to zero.
    merged.kWp = Number(product.kw || product.kWp || product.kwp) || 0;
    merged.price = Number(product.price) || 0;
    merged.batteryKwh = Number(product.battery_kwh || product.batteryKwh) || 0;
    merged.productId = product.product_id;
    merged.productName = product.name || '';
    merged.productPhase = product.electric_phase || '1';
    return merged;
  }

  function _calcProductRow(inputs, product) {
    var cashflowData = calcAnnualCashflow(inputs);
    var kpi = calcKpi(cashflowData);
    return {
      product: product,
      inputs: inputs,
      flow: cashflowData.flow,
      kpi: kpi,
      cashflow: cashflowData,
      _badges: []
    };
  }

  // ==================== Financing Rank ====================

  function rankFinancingPlans(loan, products, selectedProduct, plans, tiers, benchmarks, session, strategy) {
    if (!strategy) strategy = 'net';
    var assumptions = session._assumptions || [];
    var assumption = _getDefaultAssumption(assumptions);

    var downPct = Number(session.selected_down_percent) || 0;
    var wantTaxDeduction = session.want_tax_deduction || false;
    var hasCollateral = session.has_collateral || false;
    var hasCreditCard = session.has_credit_card || false;

    // filter feasible plans — HARD prerequisites only. wantTaxDeduction is
    // also hard when the toggle is ON: surfacing non-eligible plans (e.g.
    // ICBC personal loan) under a tax-deduction search caused sales reps to
    // mis-quote eligibility to customers. Only home_equity products
    // currently qualify for the Thai solar tax deduction.
    var feasible = plans.filter(function (plan) {
      if (plan.financing_type === 'cash') return false;
      // price_min/max: 0 or empty = no limit
      var pMin = Number(plan.price_min) || 0;
      var pMax = Number(plan.price_max) || 0;
      if (pMin > 0 && pMin > loan) return false;
      if (pMax > 0 && pMax < loan) return false;
      if (!_matchesDownOption(plan.down_percent_options, downPct)) return false;
      if (!hasCollateral && (plan.requires_collateral === true || plan.requires_collateral === 'TRUE')) return false;
      if (!hasCreditCard && (plan.requires_credit_card_of_bank === true || plan.requires_credit_card_of_bank === 'TRUE')) return false;
      if (wantTaxDeduction && !(plan.tax_deduction_eligible === true || plan.tax_deduction_eligible === 'TRUE')) return false;
      return true;
    });

    // generate term options per plan, calc metrics
    var candidates = [];
    feasible.forEach(function (plan) {
      var termStep = Number(plan.term_step_months) || 12;
      var termMin = Number(plan.term_min_months) || 12;
      var termMax = Number(plan.term_max_months) || 240;

      for (var term = termMin; term <= termMax; term += termStep) {
        var result = calcInstallmentSchedule(loan, plan, tiers, term, downPct, benchmarks);
        if (result.schedule.length === 0) continue;

        var firstInstallment = result.schedule[0].installment;
        var annualSavingYr1 = Number(session.annual_saving_yr1) || 0;
        var monthlySaving = annualSavingYr1 / 12;
        var monthlyNet = firstInstallment - monthlySaving;

        // weighted avg rate
        var weightedRate = _calcWeightedAvgRate(plan, tiers, term, downPct, benchmarks);

        var processingFee = Number(plan.processing_fee) || 0;
        candidates.push({
          plan: plan,
          term: term,
          downPct: downPct,
          firstInstallment: firstInstallment,
          avgInstallment: result.avgInstallment,
          totalInterest: result.totalInterest,
          totalVat: result.totalVat || 0,
          totalFees: (result.totalFees || 0) + processingFee,
          processingFee: processingFee,
          monthlyNet: monthlyNet,
          monthlySaving: monthlySaving,
          weightedRate: weightedRate,
          schedule: result.schedule
        });
      }
    });

    // sort by strategy. Accept both short ("rate") and long ("lowest_rate")
    // forms — the UI radios emit short, design doc uses long.
    var primary;
    switch (strategy) {
      case 'rate':
      case 'lowest_rate':
        primary = function (x) { return x.weightedRate; };
        break;
      case 'monthly':
      case 'lowest_monthly':
        primary = function (x) { return x.firstInstallment; };
        break;
      case 'interest':
      case 'lowest_total_interest':
        primary = function (x) { return x.totalInterest; };
        break;
      case 'net':
      default:
        primary = function (x) { return x.monthlyNet; };
    }
    // Apply the user's term-band filter if set. termBand is a string like
    // "short" / "mid" / "long" / "xlong" or null = ทุกระยะ.
    var termBand = session.term_band || null;
    if (termBand) {
      candidates = candidates.filter(function (c) { return _termInBand(c.term, termBand); });
    }
    candidates.sort(function (a, b) { return primary(a) - primary(b); });
    // Return all candidates; the UI handles pagination + slicing.
    return candidates;
  }

  // Map a term in months to a named band. Bands are chosen to match the
  // financing types in the sheet: CC = ≤12mo, personal loan = 24-84mo,
  // home equity = 120-240mo. Anything in between still resolves to a band.
  function _termInBand(termMonths, band) {
    var m = Number(termMonths) || 0;
    switch (band) {
      case 'short':  return m >= 1   && m <= 12;
      case 'mid':    return m >= 24  && m <= 60;
      case 'long':   return m >= 72  && m <= 84;
      case 'xlong':  return m >= 120;
      default:       return true;
    }
  }

  // Match a UI down-payment percent (0-100 integer) against a plan's
  // down_percent_options column. Uses ">= minimum" logic:
  // If plan offers [0, 10, 20], user picking 15% is OK (>= min of 0).
  // Credit card with options=[0] works for any down% because min=0.
  function _matchesDownOption(rawOptions, downPct) {
    if (rawOptions === undefined || rawOptions === null || rawOptions === '') return true;
    var parts = rawOptions.toString().split(',').map(function (s) { return s.trim(); });
    if (parts.indexOf('*') !== -1) return true;
    var target = _normalizeDownPct(downPct);
    if (isNaN(target)) return false;
    // Find minimum down% option the plan supports
    var minOption = Infinity;
    for (var i = 0; i < parts.length; i++) {
      var asPct = _normalizeDownPct(parts[i]);
      if (!isNaN(asPct) && asPct < minOption) minOption = asPct;
    }
    // User's down% must be >= plan's minimum requirement
    return target >= minOption - 0.5;
  }

  function _calcWeightedAvgRate(plan, tiers, termMonths, downPct, benchmarks) {
    var planTiers = _filterTiers(tiers, plan.plan_id, termMonths, downPct);
    if (planTiers.length === 0) return 0;
    var totalMonths = 0;
    var weightedSum = 0;
    planTiers.forEach(function (t) {
      var months = t.to_month - t.from_month + 1;
      var rate = _resolveTierRate(t, benchmarks);
      weightedSum += rate * months;
      totalMonths += months;
    });
    return totalMonths > 0 ? weightedSum / totalMonths : 0;
  }

  // ==================== Tariff / Bill helpers ====================

  function inferKwhFromBillLocal(bill, authority, tariffs) {
    if (bill <= 0) return { kWh: 0, avgRate: 0, tariff_id: '' };

    var filtered = tariffs.filter(function (t) {
      return t.authority === authority;
    });

    if (filtered.length === 0) return { kWh: 0, avgRate: 0, tariff_id: '' };

    // group by tariff_code
    var codes = {};
    filtered.forEach(function (t) {
      if (!codes[t.tariff_code]) codes[t.tariff_code] = [];
      codes[t.tariff_code].push(t);
    });

    var bestResult = null;
    var bestDiff = Infinity;

    for (var code in codes) {
      var tiers = codes[code].sort(function (a, b) { return a.from_kwh - b.from_kwh; });
      var serviceCharge = Number(tiers[0].service_charge) || 0;

      var lo = 0, hi = 5000;
      for (var iter = 0; iter < 50; iter++) {
        var mid = (lo + hi) / 2;
        var calcBill = _calcProgressiveBillLocal(mid, tiers, serviceCharge);
        if (calcBill < bill) { lo = mid; } else { hi = mid; }
      }
      var kWh = Math.round((lo + hi) / 2 * 100) / 100;
      var calcBillFinal = _calcProgressiveBillLocal(kWh, tiers, serviceCharge);
      var diff = Math.abs(calcBillFinal - bill);

      if (diff < bestDiff) {
        bestDiff = diff;
        bestResult = {
          kWh: kWh,
          avgRate: kWh > 0 ? Math.round(calcBillFinal / kWh * 10000) / 10000 : 0,
          tariff_id: tiers[0].tariff_id
        };
      }
    }

    return bestResult || { kWh: 0, avgRate: 0, tariff_id: '' };
  }

  function _calcProgressiveBillLocal(kWh, tiers, serviceCharge) {
    var total = serviceCharge;
    var remaining = kWh;
    for (var i = 0; i < tiers.length; i++) {
      if (remaining <= 0) break;
      var from = Number(tiers[i].from_kwh);
      var to = Number(tiers[i].to_kwh);
      var rate = Number(tiers[i].rate_per_kwh);
      var ft = Number(tiers[i].ft_charge) || 0;
      var blockSize = Math.min(remaining, to - from + 1);
      total += blockSize * (rate + ft);
      remaining -= blockSize;
    }
    return total;
  }

  // ==================== Self-test ====================

  function selfTest() {
    // Scenario 1: Design doc defaults (PR=0.85, FiT OFF, maint 3500)
    var inputsDefault = {
      kWp: 5, PSH: 4.5, PR: 0.85, monthlyKwh: 600, dayFraction: 0.4,
      batteryKwh: 0, includeFit: false, panelDegradation: 0.005,
      systemLifeYr: 25, electricityEscalation: 0.03, discountRate: 0.05,
      fitPrice: 2.2, maintenanceYr: 3500, avgElecRate: 4.48, price: 135000
    };

    // Scenario 2: Excel-matching (PR=0.9, FiT ON, no maint)
    var inputsExcel = {
      kWp: 5, PSH: 4.5, PR: 0.9, monthlyKwh: 600, dayFraction: 0.4,
      batteryKwh: 0, includeFit: true, panelDegradation: 0.005,
      systemLifeYr: 25, electricityEscalation: 0.03, discountRate: 0.05,
      fitPrice: 2.2, maintenanceYr: 0, avgElecRate: 4.48, price: 135000
    };

    var flowD = calcEnergyFlow(inputsDefault);
    var cfD = calcAnnualCashflow(inputsDefault);
    var kpiD = calcKpi(cfD);

    var flowE = calcEnergyFlow(inputsExcel);
    var cfE = calcAnnualCashflow(inputsExcel);
    var kpiE = calcKpi(cfE);

    return {
      designDocDefaults: {
        solarDaily: Math.round(flowD.solarDaily * 100) / 100,
        payback: kpiD.payback ? Math.round(kpiD.payback * 100) / 100 : null,
        npv: Math.round(kpiD.npv),
        annualSavingYr1: Math.round(kpiD.annualSavingYr1)
      },
      excelParams: {
        solarDaily: Math.round(flowE.solarDaily * 100) / 100,
        payback: kpiE.payback ? Math.round(kpiE.payback * 100) / 100 : null,
        npv: Math.round(kpiE.npv),
        annualSavingYr1: Math.round(kpiE.annualSavingYr1)
      }
    };
  }

  // ==================== Monthly Breakdown (summary dashboard) ====================
  // Year-1 monthly breakdown of energy and money flow for the selected
  // product + plan. Lets the UI explain WHERE the "ผ่อนสุทธิ" number comes
  // from instead of just showing a single net.
  function calcMonthlyBreakdown(prodResult, planResult, session) {
    var flow = (prodResult && prodResult.flow) || {};
    var inputs = (prodResult && prodResult.inputs) || {};
    var product = (prodResult && prodResult.product) || {};

    var MO = 365 / 12; // matches the annual calc convention

    var solarKwhMo  = (flow.solarDaily || 0) * MO;
    var selfKwhMo   = (flow.selfD      || 0) * MO;
    var sellKwhMo   = (flow.sellD      || 0) * MO;
    var buyKwhMo    = (flow.buyD       || 0) * MO;
    var chargeKwhMo = (flow.chargeD    || 0) * MO;
    var battOutKwhMo= (flow.battOut    || 0) * MO;
    var dayDirectKwhMo = Math.max(0, selfKwhMo - battOutKwhMo);

    var elecRate = Number(inputs.avgElecRate) || 4.0;
    var fitPrice = Number(inputs.fitPrice) || 2.2;
    var includeFit = inputs.includeFit === true || inputs.includeFit === 'TRUE';
    var hasBattery = (flow.hasBattery === true) || (Number(product.battery_kwh) > 0);

    var daySavingMo   = dayDirectKwhMo * elecRate;
    var nightSavingMo = battOutKwhMo * elecRate;
    var fitIncomeMo   = includeFit ? sellKwhMo * fitPrice : 0;
    var totalSavingMo = daySavingMo + nightSavingMo;

    // Prefer the user-entered bill — that's the number they recognise.
    // Fall back to monthlyKwh × avgRate when bill is missing.
    var currentBillMo = Number(session && session.monthly_bill) || (Number(inputs.monthlyKwh) || 0) * elecRate;
    var newBillMo = Math.max(0, currentBillMo - totalSavingMo);

    var installmentMo = 0;
    if (planResult) {
      installmentMo = Number(planResult.firstInstallment) || Number(planResult.monthlyPayment) || 0;
    }

    var outlayBefore = currentBillMo;
    var outlayAfter  = newBillMo + installmentMo - fitIncomeMo;
    var outlayDelta  = outlayAfter - outlayBefore;

    return {
      elecRate: elecRate,
      fitPrice: fitPrice,
      includeFit: includeFit,
      hasBattery: hasBattery,
      solarKwhMo: solarKwhMo,
      dayDirectKwhMo: dayDirectKwhMo,
      selfKwhMo: selfKwhMo,
      sellKwhMo: sellKwhMo,
      buyKwhMo: buyKwhMo,
      chargeKwhMo: chargeKwhMo,
      battOutKwhMo: battOutKwhMo,
      buyCostMo: buyKwhMo * elecRate,
      daySavingMo: daySavingMo,
      nightSavingMo: nightSavingMo,
      fitIncomeMo: fitIncomeMo,
      totalSavingMo: totalSavingMo,
      currentBillMo: currentBillMo,
      newBillMo: newBillMo,
      installmentMo: installmentMo,
      outlayBefore: outlayBefore,
      outlayAfter: outlayAfter,
      outlayDelta: outlayDelta
    };
  }

  // ==================== Public API ====================

  return {
    calcEnergyFlow: calcEnergyFlow,
    calcAnnualCashflow: calcAnnualCashflow,
    calcKpi: calcKpi,
    calcInstallmentSchedule: calcInstallmentSchedule,
    calcMonthlyBreakdown: calcMonthlyBreakdown,
    buildSystemComparison: buildSystemComparison,
    rankFinancingPlans: rankFinancingPlans,
    inferKwhFromBill: inferKwhFromBillLocal,
    selfTest: selfTest
  };

})();
</script>
